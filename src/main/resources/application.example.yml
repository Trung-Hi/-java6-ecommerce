# --- CẤU HÌNH ỨNG DỤNG ---
# Copy file này thành application.yml và điền giá trị thật
# Đừng commit file application.yml lên Git (đã được thêm vào .gitignore)

spring:
  application:
    name: Asignment_Java5
  
  # --- CẤU HÌNH DATABASE ---
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ASM_Java5
    username: sa
    password: YOUR_DATABASE_PASSWORD
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2012Dialect
        format_sql: true
  
  # --- CẤU HÌNH UPLOAD FILE ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  
  # --- CẤU HÌNH SECURITY & OAUTH2 ---
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope:
              - openid
              - profile
              - email
            redirect-uri: http://localhost:8080/login/oauth2/code/google
  
  # --- CẤU HÌNH EMAIL ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL_ADDRESS
    password: YOUR_EMAIL_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# --- CẤU HÌNH SERVER ---
server:
  port: 8080
  servlet:
    context-path: /

# --- CẤU HÌNH PAYOS (THANH TOÁN) ---
payos:
  client-id: YOUR_PAYOS_CLIENT_ID
  api-key: YOUR_PAYOS_API_KEY
  checksum-key: YOUR_PAYOS_CHECKSUM_KEY

# --- CẤU HÌNH JWT ---
jwt:
  secret: YOUR_JWT_SECRET_KEY_MIN_256_BITS
  access-token-expiration-ms: 86400000  # 24 giờ
  refresh-token-expiration-ms: 604800000  # 7 ngày

# --- CẤU HÌNH LOGGING ---
logging:
  level:
    com.poly.ASM: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# --- CẤU HÌNH KHÁC ---
file:
  upload-dir: uploads/

# --- HƯỚNG DẪN CẤU HÌNH ---
# 1. Database: Tạo database SQL Server tên "ASM_Java5"
# 2. Google OAuth2: Lấy client-id và client-secret từ Google Cloud Console
#    - Go to: https://console.cloud.google.com/apis/credentials
#    - Create OAuth 2.0 Client ID (Web application)
#    - Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# 3. PayOS: Lấy keys từ https://payos.vn/
# 4. Email: Sử dụng App Password của Gmail (không dùng password thật)
#    - Go to: https://myaccount.google.com/security
#    - Enable 2-Step Verification
#    - Create App Password
# 5. JWT Secret: Tạo chuỗi ngẫu nhiên ít nhất 256 bits (32 ký tự)
